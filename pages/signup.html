<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=" />
    <title>Sign Up</title>
  </head>
  <body>
    <nav>
      <a href="../index.html">Home</a>
      <a href="./pages/signup.html"><b>Sign Up</b></a>
    </nav>

    <h1>Sign Up Form</h1>
    <form action="../results.html" method="get">
    <fieldset>
      <legend>
        Demographic Info
      </legend>

      <label>Full Name
        <input type="text" placeholder="Enter your name" name="fullname">
      </label>
      <br>

      <label>Sex
        <select name="sex">
          <option value="1">Male</option>
          <option value="2">Female</option>
          <option value="3">Other</option>
        </select>
      </label>
      <br>

      <label for="dob">Date of Birth</label>
      <input type="date" name="dob" value="2000-01-01">

      <br>
    </fieldset>

    <fieldset>
      <legend>Contact Info</legend>

      <label>Email
        <input type="email" name="email">
      </label>
      <br>

      <label>
        County
        <input list="counties" name="county"/>
        <datalist id="counties">
          <option value="Caroni">Caroni</option>
          <option value="Mayaro">Mayaro</option>
          <option value="Nariva">Nariva</option>
          <option value="Saint Andrew">Saint Andrew</option>
          <option value="Saint David">Saint David</option>
          <option value="Saint George">Saint George</option>
          <option value="Saint Patrick">Saint Patrick</option>
          <option value="Victoria">Victoria</option>
        </datalist>
      </label>
      <br>

      <label for="telephone">Telephone</label>
      <input type="tel" name="telephone" placeholder="868-123-4567">
    </fieldset>

    <fieldset>
      <legend>Courses</legend>

        <label>
          <input type="checkbox" name="courses" value="info1601" checked>
          <span>Info 1601</span>
        </label>
      
        <label>
          <input type="checkbox" name="courses" value="comp1602">
          <span>COMP 1602</span>
        </label>

        <label>
          <input type="checkbox" name="courses" value="comp1603">
          <span>COMP 1603</span>
        </label>

        <label>
          <input type="checkbox" name="courses" value="comp1604">
          <span>COMP 1604</span>
        </label>
    </fieldset>
    <br>
    <input type="submit" value="signup">
    </form>
  </body>
</html>
